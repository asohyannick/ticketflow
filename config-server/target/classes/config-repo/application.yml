eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh
  endpoint:
    health:
      show-details: always

# Distributed tracing
spring:
  sleuth:
    sampler:
      probability: 1.0       # trace 100% of requests (use lower in prod)
  zipkin:
    base-url: http://localhost:9411

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{traceId},%X{spanId}] %-5level %logger{36} - %msg%n"