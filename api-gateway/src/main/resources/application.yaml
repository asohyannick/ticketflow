server:
  port: 8080

spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/ticketflow}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          routes:
            - id: user-service-api
              uri: lb://user-service
              predicates:
                - Path=/api/users/**, /api/roles/**, /api/permissions/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    key-resolver: "#{@userKeyResolver}"
                - RewritePath=/api/(?<segment>.*), /api/${segment}

            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/user-service/v3/api-docs
              filters:
                - RewritePath=/user-service/v3/api-docs, /v3/api-docs

            - id: ticket-service-api
              uri: lb://ticket-service
              predicates:
                - Path=/api/tickets/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    key-resolver: "#{@userKeyResolver}"
                - RewritePath=/api/(?<segment>.*), /api/${segment}

            - id: ticket-service-docs
              uri: lb://ticket-service
              predicates:
                - Path=/ticket-service/v3/api-docs
              filters:
                - RewritePath=/ticket-service/v3/api-docs, /v3/api-docs

            - id: notification-service-api
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
                - RewritePath=/api/(?<segment>.*), /api/${segment}

            - id: notification-service-docs
              uri: lb://notification-service
              predicates:
                - Path=/notification-service/v3/api-docs
              filters:
                - RewritePath=/notification-service/v3/api-docs, /v3/api-docs

            - id: document-service-api
              uri: lb://document-service
              predicates:
                - Path=/api/documents/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
                - RewritePath=/api/(?<segment>.*), /api/${segment}

            - id: document-service-docs
              uri: lb://document-service
              predicates:
                - Path=/document-service/v3/api-docs
              filters:
                - RewritePath=/document-service/v3/api-docs, /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: ticket-service
        url: /ticket-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
      - name: document-service
        url: /document-service/v3/api-docs
  api-docs:
    enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    com.ticketflow.gateway: INFO
  pattern:
    console: "%d{HH:mm:ss} [%X{traceId},%X{spanId}] %-5level %logger{36} - %msg%n"

# ✅ Docker profile only needs to override what differs
---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis