spring:
  application:
    name: user-service

  config:
    import:
      - optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      - optional:file:.env.properties

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/ticketflow}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# ─────────────────────────────────────────────────────────────
# LOCAL PROFILE
# ─────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    config:
      fail-fast: false
      retry:
        initial-interval: 3000
        max-attempts: 10
        max-interval: 10000
        multiplier: 1.5

keycloak:
  server-url: http://localhost:8180
  realm: ticketflow
  client-id: ${KEYCLOAK_CLIENT_ID:ticketflow-api}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD}

server:
  port: 8081

# ─────────────────────────────────────────────────────────────
# DOCKER PROFILE
# ─────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-user:5432/user_db
    username: ${POSTGRES_USER:ticketflow}
    password: ${POSTGRES_PASSWORD:ticketflow123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    config:
      fail-fast: false
      retry:
        initial-interval: 3000
        max-attempts: 10
        max-interval: 10000
        multiplier: 1.5

keycloak:
  server-url: http://keycloak:8180
  realm: ticketflow
  client-id: ${KEYCLOAK_CLIENT_ID:ticketflow-api}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:ticketflow-secret-2024}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

server:
  port: 8081

# ─────────────────────────────────────────────────────────────
# SHARED ACROSS ALL PROFILES
# ─────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

zipkin:
  tracing:
    endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html