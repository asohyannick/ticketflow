spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ticketflow
  datasource:
    url: jdbc:postgresql://localhost:5434/notification_db
    username: ticketflow
    password: ticketflow123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap

server:
  port: 8083

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: Notification Service API
    description: Kafka-driven notification system with history
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

# Logging — makes Kafka consumer activity very visible
logging:
  level:
    com.ticketflow.notification: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: INFO