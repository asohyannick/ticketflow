networks:
  ticketflow-net:
    driver: bridge

volumes:
  postgres_user_data:
  postgres_ticket_data:
  postgres_notification_data:
  postgres_document_data:
  postgres_keycloak_data:
  minio_data:
  kafka_data:
  prometheus_data:

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports: ["6379:6379"]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow123
    ports: ["5432:5432"]
    volumes: [postgres_user_data:/var/lib/postgresql/data]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres-ticket:
    image: postgres:15-alpine
    container_name: postgres-ticket
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow123
    ports: ["5433:5432"]
    volumes: [postgres_ticket_data:/var/lib/postgresql/data]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d ticket_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres-keycloak:
    image: postgres:15-alpine
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    ports: ["5436:5432"]
    volumes: [postgres_keycloak_data:/var/lib/postgresql/data]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  postgres-notification:
    image: postgres:15-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow123
    ports: ["5434:5432"]
    volumes: [postgres_notification_data:/var/lib/postgresql/data]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres-document:
    image: postgres:15-alpine
    container_name: postgres-document
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow123
    ports: ["5435:5432"]
    volumes: [postgres_document_data:/var/lib/postgresql/data]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d document_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── LAYER 2: MESSAGING & STORAGE ──
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    environment:
      KAFKA_KRAFT_MODE: "true"
      CLUSTER_ID: "2UDngNE8RWSlKcjZ5hx8iQ"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports: ["9092:9092"]
    volumes: [kafka_data:/var/lib/kafka/data]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes: [minio_data:/data]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports: ["9411:9411"]
    networks: [ticketflow-net]
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── LAYER 3: CORE SERVICES (IAM & CONFIG) ──
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak
    command: start-dev --import-realm
    depends_on:
      postgres-keycloak: { condition: service_healthy }
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports: ["8180:8180"]
    volumes: ["./keycloak/ticketflow-realm.json:/opt/keycloak/data/import/ticketflow-realm.json"]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8180/health/live"]
      interval: 20s
      timeout: 20s
      retries: 20
      start_period: 180s

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports: ["8761:8761"]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/eureka/apps || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 180s

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server

    depends_on:
      eureka-server: { condition: service_healthy }
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: native,docker
    ports: ["8888:8888"]
    networks: [ticketflow-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 120s

  # ── LAYER 4: BUSINESS MICROSERVICES ──
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    depends_on:
      postgres-user: { condition: service_healthy }
      config-server: { condition: service_healthy }
      keycloak: { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/ticketflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports: ["8081:8081"]
    networks: [ticketflow-net]

  ticket-service:
    build:
      context: .
      dockerfile: ticket-service/Dockerfile
    container_name: ticket-service
    depends_on:
      postgres-ticket: { condition: service_healthy }
      config-server: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/ticketflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports: ["8082:8082"]
    networks: [ticketflow-net]

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      postgres-notification: { condition: service_healthy }
      config-server: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/ticketflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports: ["8083:8083"]
    networks: [ticketflow-net]

  document-service:
    build:
      context: .
      dockerfile: document-service/Dockerfile
    container_name: document-service
    depends_on:
      postgres-document: { condition: service_healthy }
      config-server: { condition: service_healthy }
      minio: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/ticketflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: ticketflow-bucket
    ports: ["8084:8084"]
    networks: [ticketflow-net]

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      config-server: { condition: service_healthy }
      keycloak: { condition: service_started }
      redis: { condition: service_healthy }
      zipkin: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/ticketflow
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      REDIS_HOST: redis
    ports: ["8080:8080"]
    networks: [ticketflow-net]