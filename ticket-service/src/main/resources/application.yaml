spring:
  application:
    name: ticket-service
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ticketflow
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8082

# Resilience4j — circuit breaker + retry config
resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50        # open circuit after 50% failure rate
        wait-duration-in-open-state: 10s  # stay open for 10s before trying again
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      user-service:
        max-attempts: 3                   # try 3 times before giving up
        wait-duration: 500ms              # wait 500ms between retries
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException

# Feign configuration
feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
  circuitbreaker:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,retries
  health:
    circuitbreakers:
      enabled: true    # shows circuit state in /actuator/health
